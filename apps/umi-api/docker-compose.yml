# umi-api on a VPS: web + worker (one image, two commands) + redis + caddy.
#
# Local dev:  docker compose up -d --build   (builds the image locally)
# VPS deploy: handled by CI. The GitHub Actions pipeline builds & pushes the
#   image to GHCR, then the VPS runs `docker compose pull && up -d` — no build
#   on the box. The deployed tag is pinned via UMI_API_TAG in .env.
#   See docs/deploy-pipeline.md.

services:
  umi-api:
    # `image` is what the VPS pulls from GHCR; `build` is the local-dev fallback.
    image: ghcr.io/umiconsulting/umi-api:${UMI_API_TAG:-latest}
    build: .
    command: node dist/main.js
    env_file: .env
    environment:
      - NODE_ENV=production
    expose:
      - "3000"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  umi-worker:
    # Same image as umi-api — one build, two commands.
    image: ghcr.io/umiconsulting/umi-api:${UMI_API_TAG:-latest}
    build: .
    command: node dist/worker.js
    env_file: .env
    environment:
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Set API_DOMAIN in .env to a real hostname on the VPS for automatic TLS.
      - API_DOMAIN=${API_DOMAIN:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - umi-api
    restart: unless-stopped

volumes:
  redis-data:
  caddy-data:
  caddy-config:
