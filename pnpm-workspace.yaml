# Workspace members: umi-dashboard, umi-landing-page, umi-api, and shared packages/*.
# Directories without a package.json (umi-kds Swift app) are skipped by pnpm.
#
# umi-api joined the workspace with its Docker→pnpm migration so it can consume
# packages/contract. Its image is now built from the repo root with pnpm (multi-stage
# `pnpm deploy`); the VPS still only pulls the prebuilt image (never builds).
#
# Excluded on purpose (keeps its own npm lockfile — do NOT pull into the workspace):
#   - umi-cash: FROZEN until the dashboard cutover.
packages:
  - "apps/*"
  - "!apps/umi-cash"
  - "packages/*"

# pnpm 10 blocks dependency install-scripts by default. These native deps
# legitimately need theirs (esbuild → vite binary, sharp → Next image opt,
# better-sqlite3 → native binding). Approved explicitly instead of globally.
onlyBuiltDependencies:
  - esbuild
  - sharp
  - better-sqlite3
  - msgpackr-extract
  - unrs-resolver
