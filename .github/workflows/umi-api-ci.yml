name: umi-api CI

# PR gate only. Pushes to main are checked + built + deployed by
# umi-api-deploy.yml (which re-runs these same checks before shipping),
# so running on `push` here too would just double the work on every merge.
#
# umi-api is a pnpm workspace member: install/build/test run from the repo root
# with pnpm --filter. Workspace-level files are watched too, since they affect
# the umi-api build.
on:
  pull_request:
    paths:
      - "apps/umi-api/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - "turbo.json"
      - ".github/workflows/umi-api-ci.yml"

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Enable pnpm (corepack)
        run: |
          corepack enable
          corepack prepare pnpm@10.29.3 --activate

      - name: Install
        run: pnpm install --frozen-lockfile --filter @umi/api...

      - name: Typecheck
        run: pnpm --filter @umi/api typecheck

      - name: Build
        run: pnpm --filter @umi/api build

      - name: Test
        run: pnpm --filter @umi/api test
