name: umi-api CI

on:
  push:
    paths:
      - "apps/umi-api/**"
      - ".github/workflows/umi-api-ci.yml"
  pull_request:
    paths:
      - "apps/umi-api/**"
      - ".github/workflows/umi-api-ci.yml"

defaults:
  run:
    working-directory: apps/umi-api

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/umi-api/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test
