name: umi-api CI

# Runs on every PR, and on pushes to `build-v3`.
#
# `main` is deliberately absent from the push list: umi-api-deploy.yml runs this
# same typecheck + build + test gate before it ships, so a push trigger here
# would double the work on every merge to main. `build-v3` has no deploy
# workflow, so until this trigger existed a merge into it ran NO job at all —
# the PR was tested, the merge result never was.
#
# umi-api is a pnpm workspace member: install/build/test run from the repo root
# with pnpm --filter. Workspace-level files are watched too, since they affect
# the umi-api build.
#
# ⚠️ NO `paths:` FILTER — DO NOT ADD ONE. This check is REQUIRED by branch
# protection on `build-v3`, and GitHub leaves a required-but-skipped check Pending
# forever rather than treating it as passed — so a filter would make every PR that
# misses it UNMERGEABLE, not faster. Unconditional is what makes "required" safe.
# The job is ~35s, which is not worth a deadlock.
on:
  pull_request:
  push:
    branches: [build-v3]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Enable pnpm (corepack)
        run: |
          corepack enable
          corepack prepare pnpm@10.29.3 --activate

      - name: Install
        run: pnpm install --frozen-lockfile --filter @umi/api...

      # Build workspace deps (e.g. @umi/contract) before umi-api, in topological
      # order, so its generated types/dist exist for the typecheck below.
      - name: Build
        run: pnpm --filter @umi/api... build

      - name: Typecheck
        run: pnpm --filter @umi/api typecheck

      - name: Test
        run: pnpm --filter @umi/api test
