# Builds and ships umi-api to the VPS on every merge to main. Thin caller of the
# reusable deploy-backend workflow — see .github/workflows/deploy-backend.yml.
name: umi-api deploy

on:
  push:
    branches: [main]
    paths:
      - "apps/umi-api/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - "turbo.json"
      - ".github/workflows/umi-api-deploy.yml"
      - ".github/workflows/deploy-backend.yml"

# Never run two umi-api deploys at once; let an in-flight one finish.
concurrency:
  group: deploy-umi-api
  cancel-in-progress: false

# The repo's default GITHUB_TOKEN is read-only, so grant this caller the
# packages:write it needs to push to GHCR (plus contents:read for checkout).
# Without this, the reusable workflow's packages:write request exceeds the
# caller's permission ceiling and the run fails at startup.
permissions:
  contents: read
  packages: write

jobs:
  deploy:
    uses: ./.github/workflows/deploy-backend.yml
    with:
      app_name: umi-api
      app_dir: apps/umi-api
      package_name: "@umi/api"
      image: ghcr.io/umiconsulting/umi-api
      health_url: https://api.umiconsulting.co/health
    secrets: inherit
