name: contract CI

# Gates the @umi/contract package: types compile, the dual build succeeds, and the
# route literals stay byte-exact to the controllers. dist/ is git-ignored (umi-api
# builds it in-workspace; the dashboard uses the source), so CI builds it here.
#
# Also runs on pushes to `build-v3`, which has no deploy workflow to re-check a
# merge. Note that umi-api-deploy.yml does NOT cover this gate on main either:
# it builds @umi/contract as a dependency, but never runs the route-literal tests.
#
# ⚠️ NO `paths:` FILTER — DO NOT ADD ONE. This check is REQUIRED by branch
# protection on `build-v3`, and GitHub leaves a required-but-skipped check Pending
# forever rather than treating it as passed — so a filter would make every PR that
# misses it UNMERGEABLE, not faster. Unconditional is what makes "required" safe.
# There is also a correctness argument here: this gate proves the route literals
# still match the controllers, and a controller edit lives OUTSIDE packages/contract.
# The old filter could not see the change most likely to break it.
on:
  pull_request:
  push:
    branches: [build-v3]

permissions:
  contents: read

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'

      - name: Enable pnpm (corepack)
        run: |
          corepack enable
          corepack prepare pnpm@10.29.3 --activate

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @umi/contract typecheck

      - name: Build (tsup dual CJS+ESM+dts)
        run: pnpm --filter @umi/contract build

      - name: Route-literal tests
        run: pnpm --filter @umi/contract test
