# Reusable CD for a self-hosted umi backend service (umi-api today; umi-logs or
# any future Docker service tomorrow). It:
#   1. typecheck + build + test (gate)
#   2. build the Docker image and push it to GHCR (off the VPS)
#   3. SSH to the VPS and run the app's deploy/deploy.sh, which pulls the new
#      image and rolls the containers — no build on the live box.
#
# Add another backend: it must be a pnpm workspace member with a root-context
# Dockerfile (`docker build -f apps/<app>/Dockerfile .`). Copy
# .github/workflows/umi-api-deploy.yml, change the inputs (incl. package_name),
# and ship a apps/<app>/deploy/deploy.sh. Nothing here needs to change.
name: Deploy backend (reusable)

on:
  workflow_call:
    inputs:
      app_name:
        description: "Service name, also the apps/<app_name> dir on the VPS (e.g. umi-api)"
        type: string
        required: true
      app_dir:
        description: "Path to the app in this repo (e.g. apps/umi-api)"
        type: string
        required: true
      package_name:
        description: "pnpm workspace package name for --filter (e.g. @umi/api)"
        type: string
        required: true
      image:
        description: "GHCR image name without tag (e.g. ghcr.io/umiconsulting/umi-api)"
        type: string
        required: true
      node_version:
        type: string
        default: "22"
      health_url:
        description: "Optional URL to curl after deploy; empty disables the check"
        type: string
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    # Pass the caller's package name through the environment rather than
    # interpolating ${{ }} straight into run: scripts (avoids shell injection).
    env:
      PACKAGE_NAME: ${{ inputs.package_name }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ inputs.node_version }}
      - name: Enable pnpm (corepack)
        run: |
          corepack enable
          corepack prepare pnpm@10.29.3 --activate
      - name: Install
        run: pnpm install --frozen-lockfile --filter "$PACKAGE_NAME..."
      # Build workspace deps before the app, topologically, so their generated
      # types/dist exist for the typecheck.
      - run: pnpm --filter "$PACKAGE_NAME..." build
      - run: pnpm --filter "$PACKAGE_NAME" typecheck
      - run: pnpm --filter "$PACKAGE_NAME" test

  build-push-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Build & push image to GHCR
        env:
          IMAGE: ${{ inputs.image }}
          DIR: ${{ inputs.app_dir }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GH_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker build \
            -t "$IMAGE:sha-${{ github.sha }}" \
            -t "$IMAGE:latest" \
            -f "$DIR/Dockerfile" .
          docker push "$IMAGE:sha-${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: Deploy over SSH
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          SSH_HOST: ${{ secrets.VPS_HOST }}
          SSH_USER: ${{ secrets.VPS_USER }}
          SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
          APP_NAME: ${{ inputs.app_name }}
          DEPLOY_SCRIPT: ${{ inputs.app_dir }}/deploy/deploy.sh
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          # Stream deploy.sh to a temp file on the box, then run it with stdin
          # detached (< /dev/null). Piping the script straight into `bash -s`
          # breaks: deploy.sh's own `git fetch` spawns an ssh-to-GitHub that
          # drains the very stdin the script is being read from, so bash hits
          # EOF mid-script and dies silently. cat-to-file + /dev/null avoids it.
          ssh -i ~/.ssh/id_deploy -o IdentitiesOnly=yes \
            -o BatchMode=yes -o ConnectTimeout=15 -p "$SSH_PORT" \
            "$SSH_USER@$SSH_HOST" \
            "cat > /tmp/$APP_NAME-deploy.sh && APP_NAME='$APP_NAME' bash /tmp/$APP_NAME-deploy.sh 'sha-${{ github.sha }}' < /dev/null" \
            < "$DEPLOY_SCRIPT"

      - name: Health check
        if: ${{ inputs.health_url != '' }}
        run: |
          for i in $(seq 1 10); do
            if curl -fsS --max-time 5 "${{ inputs.health_url }}" >/dev/null; then
              echo "Health OK: ${{ inputs.health_url }}"; exit 0
            fi
            echo "Waiting for health ($i/10)..."; sleep 6
          done
          echo "Health check failed: ${{ inputs.health_url }}"; exit 1
